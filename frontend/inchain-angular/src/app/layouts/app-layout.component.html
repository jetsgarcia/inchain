<div class="flex h-dvh overflow-hidden">
  <app-sidebar
    [navigationItems]="navigationItems"
    [activePath]="currentPath()"
    [userName]="userName"
    [collapsed]="sidebarCollapsed()"
    (logOut)="promptLogout()"
    (toggleCollapse)="toggleSidebar()"
  />
  <main class="flex-1 overflow-y-auto bg-background">
    <div class="mx-auto max-w-6xl px-6 py-8">
      <router-outlet />
    </div>
  </main>

  <!-- Logout confirmation -->
  @if (showLogoutConfirm()) {
    <div class="fixed inset-0 z-50 bg-black/50" (click)="cancelLogout()"></div>
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div class="w-full max-w-sm rounded-2xl border border-border bg-background p-6 shadow-xl">
        <p class="text-sm font-medium">Sign out?</p>
        <p class="mt-1 text-sm text-muted-foreground">You will be returned to the login screen.</p>
        <div class="mt-4 flex items-center justify-end gap-2">
          <button
            type="button"
            class="rounded-lg border border-border px-3 py-1.5 text-sm font-medium transition-colors hover:bg-muted"
            (click)="cancelLogout()"
          >Cancel</button>
          <button
            type="button"
            class="rounded-lg bg-primary px-3 py-1.5 text-sm font-medium text-primary-foreground transition-colors hover:bg-primary/90"
            (click)="confirmLogout()"
          >Sign out</button>
        </div>
      </div>
    </div>
  }
</div>
